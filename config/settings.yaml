# Pipeline settings. Models are Groq free tier ONLY (per-model quotas are separate,
# so splitting roles across models multiplies free capacity).

scraper:
  provider: kaito                      # kaito | apidojo  (swap = this line only)
  providers:
    kaito:
      actor_id: kaitoeasyapi/twitter-x-data-tweet-scraper-pay-per-result-cheapest
    apidojo:
      actor_id: apidojo/tweet-scraper
  queries_per_run: 6                   # rotated deterministically by run number
  max_items_per_query: 25
  max_total_items_per_run: 120         # cost guard + keeps scoring under Groq free-tier TPM
  freshness_hours: 24                  # HARD RULE: nothing older is ever processed
  retry_if_below: 5                    # if a scrape yields < this, re-run once (actor flakiness)
  max_scrape_attempts: 2               # total attempts per run (1 retry)

prefilter:
  min_followers: 25
  max_followers: 100000                # >100k accounts bury replies; not worth delivering
  min_account_age_days: 90
  max_posts_per_day: 50
  max_following_ratio: 3.0             # following > 3x followers = junk signal

scoring:
  # High-volume stage (one call per surviving tweet). llama-3.3-70b has the most generous
  # free-tier throughput and scores the rubric well; gpt-oss-120b (lower TPM) is the fallback.
  model: llama-3.3-70b-versatile
  fallback_model: openai/gpt-oss-120b
  deliver_threshold: 70
  borderline_threshold: 50

drafting:
  # Model IDs verified against the account's /models list (Jul 2026). kimi-k2 and
  # llama-4-maverick are not available on this account; gpt-oss-120b is the strongest
  # writer available. Swap here if better models appear — one config line.
  model: openai/gpt-oss-120b
  fallback_model: meta-llama/llama-4-scout-17b-16e-instruct
  checker_model: llama-3.3-70b-versatile  # different family = better AI-tell detection
  recent_style_exclusion: 5            # styles used in last N delivered leads are excluded
  max_reply_chars: 280

markets:
  # ISO country codes considered target markets. Confirmed outside => dropped.
  # Unknown/ambiguous location => delivered with lowered confidence + flag.
  # NOTE: quotes are required — YAML parses bare NO (Norway) as the boolean false.
  target: ["US", "CA", "GB", "IE", "AU", "NZ", "DE", "NL", "SE", "NO", "DK", "FI", "CH", "AT", "BE", "FR"]

llm:
  throttle_seconds: 3.0                # Groq free tier is token/min limited; ~3s keeps scoring under TPM
  max_retries: 2

discord:
  max_leads_per_message_burst: 15      # safety cap per run
